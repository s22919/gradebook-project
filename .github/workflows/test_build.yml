name: Test and Build Workflow

# Wykonywanie automatycznie po operacji push na gałąź master lub main
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      # Krok zerowy: Pobranie kodu repozytorium na maszynę wirtualną
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Krok zerowy: Instalacja i konfiguracja środowiska Java
      - name: Konfiguracja środowiska Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # 1. Uruchomienie aplikacji przy pomocy mvn exec
      - name: 1. Uruchomienie aplikacji (Dry run)
        run: mvn clean compile exec:java

      # 2. Audyt jakości kodu przy pomocy Super-linter
      - name: 2. Audyt jakości kodu (Super-linter)
        uses: github/super-linter@b807e99ddd37e444d189cfd2c2ca1274d8ae8ef1 # v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false

      # 3. Wykonanie testów jednostkowych
      - name: 3. Wykonanie testów jednostkowych
        run: mvn test

      # 4. Test pakowania aplikacji do formatu Java Archive (.jar)
      # Używamy flagi -DskipTests, aby nie uruchamiać testów ponownie (wykonaliśmy je krok wcześniej)
      - name: 4. Pakowanie aplikacji do pliku .jar
        run: mvn package -DskipTests

      # 5. Przygotowanie zbudowanego pliku .jar do pobrania
      - name: 5. Udostępnienie pliku .jar jako artefaktu
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aplikacja-jar
          path: target/*.jar
          retention-days: 7 # Artefakt będzie dostępny do pobrania przez 7 dni
